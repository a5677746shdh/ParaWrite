# ParaWrite Docker 配置示例 / Docker configuration example
#
# 文件路径：相对路径均相对于 /app（config/ 的上一级）
# File paths: relative paths resolve from /app (parent of config/)

server:
  host: 0.0.0.0
  port: 8787

app:
  default_provider: DeepSeek
  default_model: deepseek-v4-flash
  auto_translate_delay_seconds: 3
  runtime_env: docker
  translate_on_enter: false
  alternatives_separator:
    default: comma
    by_language:
      zh: period
      ja: period
  layout:
    three_column_min_width: 1280
    two_column_min_width: 768
    # pane_width_ratios:
    #   default: 0.5
    #   by_pair:
    #     zh-en: 0.4
  selection_copy_enabled: false
  word_lookup_mode: adaptive
  rephrase_hover_preview_enabled: false
  rephrase_hover_preview_delay_ms: 800
  rephrase_back_translation_preload: off

providers:
  DeepSeek:
    type: openai_compatible
    base_url: https://api.deepseek.com/v1
    api_key: ${DEEPSEEK_API_KEY}
    models:
      - id: deepseek-v4-flash
        name: DeepSeek V4 Flash
        default: true

dictionary:
  free_dictionary: true
  wiktionary: true
  llm_fallback: true
  llm_show_examples: false

glossary:
  file: config/glossary.yaml
  point_out_glossary: off

pwa:
  assetlinks_file: config/assetlinks.json

auth:
  access_totp_secret: ${ACCESS_TOTP_SECRET}
  restart_totp_secret: ${RESTART_TOTP_SECRET}
  session_ttl_hours: 24

users:
  login:
    mode: disabled                # 容器默认关闭用户登录；改为 open/restricted 可启用
    allowed_usernames: []           # 白名单；open 模式下控制重启后端按钮
    session_ttl_hours: 168
  history:
    similarity_threshold: 0.85
    dedup_interval_seconds: 60
    page_size: 5
  data_dir: /app/data               # 与 docker-compose volume 挂载路径一致

logging:
  include_client_ip: false
  include_user_input: false
  invalid_access_code: false
  invalid_restart_code: false
  restricted_registration: false
  login_failures: false
  backend_restart: false
  app_api_errors: false
  model_api_errors: false

theme:
  primary: '#0f2b46'
  accent: '#2d7ff9'
  background: '#f5f7fa'
  surface: '#ffffff'
  border: '#d8dee9'
  muted: '#6b7c93'
  success: '#16a34a'
  error: '#dc2626'
  warning: '#f59e0b'
  alert: '#ea580c'
