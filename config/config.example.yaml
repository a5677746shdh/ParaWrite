# ParaWrite 配置模板 / Configuration template
# 复制为 config.yaml 用于本地开发（config.yaml 已被 git 忽略）
# Copy to config.yaml for local development (config.yaml is gitignored)
#
# 文件路径：相对路径均相对于项目根目录（config/ 的上一级）；绝对路径原样使用
# File paths: relative paths resolve from the app root (parent of config/); absolute paths are used as-is

# ---------------------------------------------------------------------------
# 服务监听 / Server
# ---------------------------------------------------------------------------
server:
  host: 0.0.0.0   # 监听地址；0.0.0.0 表示所有网卡 / bind address
  port: 8787      # HTTP 端口 / HTTP port

# ---------------------------------------------------------------------------
# 应用行为 / Application
# ---------------------------------------------------------------------------
app:
  default_provider: openai          # 默认 LLM 服务商 ID，须与 providers 中的键名一致
  default_model: gpt-4o-mini        # 默认模型 ID；可省略，则使用 provider 内 default 模型
  auto_translate_delay_seconds: 2   # 输入后自动翻译延迟（秒）；0 表示关闭
  runtime_env: dev                  # 可选，显示在版本号旁的环境标识
  translate_on_enter: false         # true：Enter 翻译；false：Ctrl/Cmd+Enter 翻译
  alternatives_separator:           # 同义词/改写候选项之间的分隔符
    default: comma                  # comma | period
    by_language:                    # 按 ISO 639-1 语言代码覆盖（如 zh、ja）
      zh: period
      ja: period
  phrase_word_threshold:            # 选中超过此词数视为短语（隐藏同义词/词典）
    default: 4
    by_language:
      zh: 5
      ja: 5
  layout:                           # 响应式布局断点（像素）
    three_column_min_width: 1280    # ≥ 此宽度：翻译区 + 词语面板三列
    two_column_min_width: 768       # ≥ 此宽度：源/译文双列
    pane_width_ratios:              # 双栏/三栏下原文与译文栏宽度比例
      default: 0.5                  # 无匹配语言对时 50:50
      by_pair:                      # 键为 ISO 639-1，如 zh-en；值为前者作原文时的原文栏占比
        zh-en: 0.4                  # 中→英：中文栏 40%；英→中：英文栏 60%（镜像，除非配置 en-zh）
  selection_copy_enabled: false     # true：多选词时复制按钮复制选中片段
  word_lookup_mode: adaptive        # immediate | manual | adaptive（区分：窄屏手动、三列立即）
  rephrase_hover_preview_enabled: false  # true：悬停备选表达后回译原文并高亮差异
  rephrase_hover_preview_delay_ms: 800     # 悬停多久后触发回译（毫秒）
  rephrase_back_translation_preload: off   # off | partial | all — 回译预加载：关闭 / 悬停时 / 查词完成后全部
  auto_swap_languages: false            # true：检测到原文语言与目标语言相同时自动交换语言对
  point_out_glossary: off   # off | first | full — 术语表词汇标注：关闭 / 首字圆点 / 全文下划线
  # language_order:           # 源语言下拉框自定义排序（ISO 639-1）；未列出的语言按名称字母序排在后面
  #   - auto
  #   - zh
  #   - en
  #   - ja
  # target_language_order:    # 译文语言下拉框排序；未设置时使用 language_order
  #   - en
  #   - zh
  #   - ja

# ---------------------------------------------------------------------------
# LLM 服务商 / Providers
# ---------------------------------------------------------------------------
providers:
  openai:
    type: openai_compatible         # openai_compatible | claude | ollama
    base_url: https://api.openai.com/v1
    api_key: ${OPENAI_API_KEY}      # 支持 ${ENV_VAR} 环境变量替换
    # proxy:                        # 可选 HTTP/SOCKS5 代理
    #   url: http://user:password@127.0.0.1:7890
    models:
      - id: gpt-4o-mini
        name: GPT-4o Mini
        default: true               # 该 provider 的默认模型
      - id: gpt-4o
        name: GPT-4o

  deepseek:
    type: openai_compatible
    base_url: https://api.deepseek.com/v1
    api_key: ${DEEPSEEK_API_KEY}
    models:
      - id: deepseek-v4-flash
        name: DeepSeek V4 Flash

  ollama:
    type: ollama
    base_url: http://127.0.0.1:11434
    models:
      - id: qwen2.5:7b
        name: Qwen 2.5 7B

# ---------------------------------------------------------------------------
# 词典 / Dictionary
# ---------------------------------------------------------------------------
dictionary:
  free_dictionary: true   # 英语：Free Dictionary API
  wiktionary: true        # 多语言：Wiktionary
  llm_fallback: true      # 以上均无结果时用 LLM 生成释义
  llm_show_examples: false  # LLM 词典是否返回/显示例句（默认关闭）

# ---------------------------------------------------------------------------
# 自定义术语表 / Glossary（相对项目根目录）
# ---------------------------------------------------------------------------
glossary:
  file: config/glossary.yaml

# ---------------------------------------------------------------------------
# PWA / Android TWA（Digital Asset Links）
# ---------------------------------------------------------------------------
pwa:
  assetlinks_file: config/assetlinks.json   # 由服务端发布在 /.well-known/assetlinks.json

# ---------------------------------------------------------------------------
# 部署级门禁（TOTP）/ Deployment access (TOTP)
# 与下方 users.login 的用户账密登录相互独立
# ---------------------------------------------------------------------------
auth:
  access_totp_secret: ${ACCESS_TOTP_SECRET}    # 设置后，进入应用需 TOTP 验证码
  restart_totp_secret: ${RESTART_TOTP_SECRET}  # 设置后，重启后端需额外 TOTP
  session_ttl_hours: 24                        # TOTP 会话 Cookie 有效期（小时）

# ---------------------------------------------------------------------------
# 用户登录与翻译历史 / User login & translation history（SQLite）
# ---------------------------------------------------------------------------
users:
  login:
    # 登录模式：disabled（关闭）| restricted（仅白名单可注册/登录）| open（任意用户）
    mode: disabled
    # 白名单用户名：restricted 模式仅限制注册；open 模式控制「重启后端」按钮可见性
    allowed_usernames:
      - alice
      - bob
    session_ttl_hours: 168   # 用户登录会话有效期（小时），默认 7 天
  history:
    similarity_threshold: 0.85    # 全部记录去重：原文相似度阈值 0~1
    dedup_interval_seconds: 60    # 去重时间窗口（秒）
    page_size: 5                  # 历史记录每页条数
  data_dir: data                  # SQLite 数据目录（相对项目根目录）；可用 PARWRITE_DATA_DIR 覆盖
  # user_config_dir: data/user-configs    # 用户偏好 YAML 目录（相对项目根目录）
  # user_glossary_dir: data/user-glossaries  # 用户独立词典 YAML 目录

# ---------------------------------------------------------------------------
# 服务端终端日志 / Server terminal logging（默认全部关闭）
# ---------------------------------------------------------------------------
logging:
  include_client_ip: false       # 安全类日志是否附带客户端 IP
  include_user_input: false      # 安全类日志是否附带用户填入内容（如用户名）
  invalid_access_code: false     # 错误的网页访问验证码
  invalid_restart_code: false    # 错误的重启验证码
  restricted_registration: false # restricted 模式下被拒绝的注册
  login_failures: false          # 同一 IP+用户名连续 3 次密码错误
  backend_restart: false         # 通过前端点击重启后端
  app_api_errors: false          # 应用 API 错误（非模型）
  model_api_errors: false        # 模型 API 错误（翻译/同义词/改写/词典）

# ---------------------------------------------------------------------------
# 界面主题色 / UI theme（#RRGGBB）
# ---------------------------------------------------------------------------
theme:
  primary: '#0f2b46'      # 主色、标题与正文
  accent: '#2d7ff9'       # 强调色、主按钮
  background: '#f5f7fa'   # 页面背景
  surface: '#ffffff'      # 卡片、弹窗背景
  border: '#d8dee9'       # 边框
  muted: '#6b7c93'        # 次要文字（如历史记录原文）
  success: '#16a34a'
  error: '#dc2626'      # 错误提示（表单校验失败等）
  warning: '#f59e0b'    # 轻度警告（如收藏星标）
  alert: '#ea580c'      # 强警告（重启后端、退出登录等）
  icon_button: '#4a6280' # 可点击图标按钮（复制、粘贴、选项等）
