server:
  host: 0.0.0.0
  port: 8787

app:
  default_provider: DeepSeek
  default_model: deepseek-v4-flash
  auto_translate_delay_seconds: 3
  runtime_env: docker
  translate_on_enter: false
  alternatives_separator:
    default: comma
    by_language:
      zho: period
      jpn: period
  layout:
    three_column_min_width: 1280
    two_column_min_width: 768

providers:
  DeepSeek:
    type: openai_compatible
    base_url: https://api.deepseek.com/v1
    api_key: ${DEEPSEEK_API_KEY}
    models:
      - id: deepseek-v4-flash
        name: DeepSeek V4 Flash
        default: true

dictionary:
  free_dictionary: true
  wiktionary: true
  llm_fallback: true

glossary:
  file: custom-dictionary.yaml

auth:
  access_totp_secret: ${ACCESS_TOTP_SECRET}
  restart_totp_secret: ${RESTART_TOTP_SECRET}
  session_ttl_hours: 24
