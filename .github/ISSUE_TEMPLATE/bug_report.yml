name: Bug report
description: Report something that isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug.
  - type: input
    id: version
    attributes:
      label: ParaWrite version
      placeholder: e.g. 0.5.2
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: 1. Open app 2. Click translate 3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: LLM provider type
      options:
        - openai_compatible
        - claude
        - ollama
        - not applicable
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Browser console, server output, or screenshot paths
